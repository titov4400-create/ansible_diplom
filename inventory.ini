# Управляющий сервер Ansible (если на нём тоже запускается playbook)
[ansible_mgmt]
ansible-mgmt ansible_host=10.0.0.10

# Контроллер домена
[domain_controllers]
dc01 ansible_host=10.0.0.1

# Сервер Kaspersky Security Center
[kaspersky_center]
ksc-server ansible_host=10.0.0.20

# Сервер Secret Net Studio
[secret_net]
sns-server ansible_host=10.0.0.30

# Клиентские узлы Linux (Astra Linux)
[kaspersky_clients_linux]
client-lin01 ansible_host=10.0.0.102
client-lin02 ansible_host=10.0.0.20

# Клиентские узлы Windows (Windows 10)
[kaspersky_clients_windows]
client-win01 ansible_host=10.0.0.101

# Группа для всех клиентов (удобно для массовых операций)
[kaspersky_clients:children]
kaspersky_clients_linux
kaspersky_clients_windows

# Общие переменные для всех хостов
[all:vars]
ansible_user=root                     # Для Linux
# Для Windows будет переопределено в группе

# Переменные для Linux-клиентов
[kaspersky_clients_linux:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_ed25519

# Переменные для Windows-клиентов
[kaspersky_clients_windows:vars]
ansible_user=Administrator
ansible_password={{ vault_windows_admin_pass }}   # Зашифровать через ansible-vault
ansible_connection=winrm
ansible_winrm_server_cert_validation=ignore
ansible_winrm_transport=basic

# Переменные для сервера KSC (Astra Linux)
[kaspersky_center:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_rsa

# Переменные для контроллера домена (если понадобится)
[domain_controllers:vars]
ansible_user=Administrator
ansible_password={{ vault_domain_admin_pass }}
ansible_connection=winrm
ansible_winrm_server_cert_validation=ignore
ansible_winrm_transport=basic

# Переменные для Secret Net Studio
[secret_net:vars]
ansible_user=Administrator
ansible_password={{ vault_sns_admin_pass }}
ansible_connection=winrm
ansible_winrm_server_cert_validation=ignore
ansible_winrm_transport=basic
